<!-- 名前空間シム: URLに ?ns=xxx があるときだけ、この画面の localStorage/sessionStorage の
     全キーに接頭辞を付けてデータを完全分離する(「勉強」タブ用)。?ns 無し(通常の /)は何もしない。
     アプリ本体・同期ブリッジより前に実行する必要があるため <head> 先頭に置く。 -->
<script>
(function(){
  try{
    var ns = new URLSearchParams(location.search).get("ns");
    if(!ns) return;                                   // 通常アクセスは一切変更しない
    ns = String(ns).replace(/[^a-zA-Z0-9_-]/g,"").slice(0,24);
    if(!ns) return;
    var P = "ns-" + ns + ":";
    window.__TASKAPP_NS__ = ns;                       // 同期ブリッジが Firestore ドキュメント選択に使う
    var proto = Storage.prototype;
    var _get = proto.getItem, _set = proto.setItem, _rem = proto.removeItem;
    proto.getItem    = function(k){ return _get.call(this, P + k); };
    proto.setItem    = function(k, v){ return _set.call(this, P + k, v); };
    proto.removeItem = function(k){ return _rem.call(this, P + k); };
    // 動作確認(失敗時は元に戻して混在を避ける)
    window.localStorage.setItem("__nstest__", "1");
    var ok = _get.call(window.localStorage, P + "__nstest__") === "1";
    window.localStorage.removeItem("__nstest__");
    if(!ok){ proto.getItem = _get; proto.setItem = _set; proto.removeItem = _rem; window.__TASKAPP_NS__ = null; }
  }catch(e){}
})();
</script>

:root{
  --bg:#f2f2f7; --card:#ffffff; --sep:#e5e5ea; --text:#1c1c1e;
  --text2:#8e8e93; --rad:18px; --radsm:11px; --blue:#007aff;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue","Hiragino Sans","Yu Gothic",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.ta-root{font-family:var(--font);color:var(--text);background:var(--bg);
  min-height:100%;height:100%;display:flex;flex-direction:column;letter-spacing:.01em;}
.ta-loading{font-family:var(--font);display:flex;gap:10px;align-items:center;justify-content:center;
  min-height:60vh;color:var(--text2);font-weight:600;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:var(--font);}

/* ---- \u5171\u901A ---- */
.ta-icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--blue);transition:background .15s;}
.ta-icon-btn:active{background:rgba(0,0,0,.06);}
.ta-pill{padding:7px 15px;border-radius:20px;font-size:15px;font-weight:600;color:var(--blue);transition:opacity .15s;}
.ta-pill:active{opacity:.5;}
.ta-pill-accent{background:var(--blue);color:#fff;}
.ta-head-actions{display:flex;align-items:center;gap:6px;margin-left:auto;}

/* ---- \u30DB\u30FC\u30E0 ---- */
.ta-home{max-width:1100px;margin:0 auto;width:100%;padding:0 18px 40px;}
.ta-home-top{display:flex;align-items:center;padding:22px 4px 8px;gap:12px;}
.ta-today{display:flex;flex-direction:column;gap:2px;}
.ta-today-label{font-size:11px;font-weight:800;color:var(--blue);letter-spacing:.12em;}
.ta-today-date{font-size:22px;font-weight:800;letter-spacing:-.01em;}
.ta-home-app{font-size:15px;font-weight:700;color:var(--text2);letter-spacing:.02em;}
.ta-section-title{font-size:26px;font-weight:800;margin:18px 2px 14px;letter-spacing:-.02em;}

/* \u30AB\u30A6\u30F3\u30C8\u30C0\u30A6\u30F3 */
.ta-cd-row{display:flex;gap:10px;flex-wrap:wrap;padding:6px 2px 4px;}
.ta-cd-chip{position:relative;background:var(--card);border-radius:14px;padding:10px 14px;min-width:120px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:2px;}
.ta-cd-del{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:#e5e5ea;
  color:var(--text2);display:flex;align-items:center;justify-content:center;}
.ta-cd-label{font-size:12px;font-weight:700;color:var(--text2);padding-right:14px;}
.ta-cd-num{font-size:19px;font-weight:800;color:var(--blue);}
.ta-cd-date{font-size:11px;color:var(--text2);}
.ta-cd-add{display:inline-flex;align-items:center;gap:4px;background:#eef2ff;color:var(--blue);
  border-radius:14px;padding:10px 14px;font-size:13px;font-weight:700;align-self:center;}
.ta-cd-add:active{background:#dde6ff;}

/* \u4E00\u8A00\uFF08\u76EE\u6A19\u30FB\u5FD8\u308C\u306A\u3044\u3053\u3068\uFF09*/
.ta-headline{background:linear-gradient(135deg,#fff7ed,#fff);border:1px solid #ffe4c4;border-radius:18px;
  padding:14px 18px;margin:12px 0 6px;box-shadow:0 2px 8px rgba(255,149,0,.08);}
.ta-headline-input{width:100%;border:none;outline:none;resize:none;overflow:hidden;background:transparent;
  font-size:20px;font-weight:800;line-height:1.4;color:#1c1c1e;font-family:var(--font);word-break:break-word;}
.ta-headline-input::placeholder{color:#d6a96a;font-weight:600;}
.ta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
.ta-card{position:relative;aspect-ratio:3/2;border-radius:22px;padding:16px;display:flex;flex-direction:column;
  justify-content:flex-end;color:#fff;overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.12);transition:transform .12s ease,box-shadow .2s;
  background-image:linear-gradient(150deg,rgba(255,255,255,.18),rgba(255,255,255,0) 55%);}
.ta-card:active{transform:scale(.97);}
.ta-card-emoji{position:absolute;top:14px;left:16px;font-size:26px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));}
.ta-card-name{font-size:18px;font-weight:700;line-height:1.2;text-shadow:0 1px 2px rgba(0,0,0,.15);}
.ta-card-count{font-size:12.5px;opacity:.92;margin-top:3px;font-weight:500;}
.ta-card-add{background:transparent;border:2px dashed #c7c7cc;color:var(--text2);box-shadow:none;
  justify-content:center;align-items:center;gap:6px;background-image:none;}
.ta-card-add span{font-size:13px;font-weight:600;}
.ta-card-del{position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.45);color:#fff;display:flex;align-items:center;justify-content:center;}
.ta-card-grip{position:absolute;top:9px;left:9px;width:30px;height:30px;border-radius:9px;
  background:rgba(0,0,0,.35);color:#fff;display:flex;align-items:center;justify-content:center;
  touch-action:none;cursor:grab;z-index:6;}
.ta-jiggle{animation:jig .28s infinite alternate ease-in-out;}
.ta-jiggle:nth-child(even){animation-delay:.1s;}
@keyframes jig{from{transform:rotate(-.8deg);}to{transform:rotate(.8deg);}}
.ta-dragging{opacity:.95;z-index:30;box-shadow:0 16px 34px rgba(0,0,0,.28);animation:none;transition:none;}
.ta-hint{text-align:center;color:var(--text2);font-size:13px;margin-top:22px;}

/* ---- \u30BF\u30B9\u30AF\u4E00\u89A7\u30AB\u30FC\u30C9\uFF08\u5168\u5E45\u30FB\u6700\u4E0A\u90E8\uFF09---- */
.ta-tl-card{width:100%;aspect-ratio:auto;min-height:104px;border-radius:22px;
  background-color:#2c2c2e;background-image:linear-gradient(135deg,#2c2c2e,#48484a);
  color:#fff;align-items:flex-start;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.2);}
.ta-tl-top{display:flex;align-items:center;gap:9px;}
.ta-tl-ico{width:30px;height:30px;border-radius:9px;background:#0a84ff;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.ta-tl-title{font-size:16px;font-weight:700;color:#fff;}
.ta-tl-stat{display:flex;align-items:baseline;gap:7px;margin-top:11px;}
.ta-tl-num{font-size:34px;font-weight:800;line-height:1;color:#fff;}
.ta-tl-unit{font-size:13px;color:rgba(255,255,255,.82);}
.ta-tl-sub{font-size:12.5px;color:rgba(255,255,255,.78);margin-top:7px;}

/* ---- \u30BF\u30B9\u30AF\u4E00\u89A7\uFF08\u6A2A\u65AD\u30D3\u30E5\u30FC\uFF09---- */
.ta-alltasks{min-height:100vh;}
.ta-seg-wrap{display:flex;align-items:center;gap:12px;padding:12px 22px 4px;max-width:860px;width:100%;}
.ta-seg{display:inline-flex;background:#e3e3e8;border-radius:11px;padding:3px;}
.ta-seg button{padding:7px 14px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--text2);transition:.15s;white-space:nowrap;}
.ta-seg-on{background:#fff;color:var(--text)!important;box-shadow:0 1px 3px rgba(0,0,0,.14);}
.ta-seg-note{font-size:13px;color:var(--text2);margin-left:auto;}
.ta-custom-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 22px 8px;max-width:860px;width:100%;}
.ta-custom-hint{font-size:12.5px;color:var(--text2);}
.ta-custom-init{font-size:12.5px;color:var(--text2);margin-left:auto;}
.ta-custom-bar button{background:#eef2ff;color:var(--blue);border-radius:9px;padding:6px 12px;font-size:13px;font-weight:600;}
.ta-custom-bar button:active{background:#dde6ff;}
.ta-at-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;padding:2px 0;}
.ta-at-body .ta-task-text{width:100%;font-size:16px;}
.ta-at-proj{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-weight:600;}
.ta-at-dot{width:19px;height:19px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex:none;color:#fff;overflow:hidden;white-space:nowrap;line-height:1;font-weight:600;}

/* ---- \u5206\u5272\u30D3\u30E5\u30FC ---- */
.ta-split{display:grid;grid-template-columns:1fr 4fr;height:100%;min-height:100vh;}
.ta-rail{background:#e9e9ee;border-right:1px solid var(--sep);display:flex;flex-direction:column;
  align-items:center;padding:14px 0;gap:14px;overflow-y:auto;}
.ta-rail-home{width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;
  justify-content:center;color:var(--text2);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.ta-rail-list{display:flex;flex-direction:column;gap:11px;width:100%;align-items:center;padding:0 8px;}
.ta-rail-card{width:100%;max-width:62px;aspect-ratio:3/2;border-radius:13px;display:flex;align-items:center;
  justify-content:center;font-size:21px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .12s,filter .2s;
  overflow:hidden;white-space:nowrap;line-height:1;font-weight:600;padding:2px;}
.ta-rail-card:active{transform:scale(.93);}
.ta-rail-active{box-shadow:0 0 0 3px rgba(0,0,0,.12) inset, 0 2px 6px rgba(0,0,0,.18);transform:scale(.96);}

.ta-content{display:flex;flex-direction:column;height:100%;min-width:0;background:var(--bg);}
.ta-content-head{display:flex;align-items:center;gap:10px;padding:16px 22px;
  background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:3;}
.ta-back{display:flex;align-items:center;color:var(--accent,var(--blue));margin-left:-6px;}
.ta-content-emoji{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);overflow:hidden;white-space:nowrap;line-height:1;
  font-weight:600;flex:none;}
.ta-content-head h2{font-size:21px;font-weight:700;margin:0;letter-spacing:-.01em;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
.ta-content-scroll{flex:1;overflow-y:auto;padding:20px 22px 60px;max-width:860px;width:100%;}

/* ---- \u5099\u8003\uFF08\u53F3\u30B9\u30EF\u30A4\u30D7\u3067\u30D7\u30ED\u30B8\u30A7\u30AF\u30C8\u5B8C\u4E86\uFF09---- */
.ta-notes-swipe{position:relative;margin-bottom:20px;border-radius:var(--rad);overflow:hidden;}
.ta-notes-complete{position:absolute;left:0;top:0;bottom:0;width:118px;display:flex;flex-direction:column;

.ta-notes-box label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.ta-swipe-hint{font-weight:600;color:#cdcdd2;text-transform:none;letter-spacing:0;}
.ta-notes-box textarea{width:100%;border:none;outline:none;resize:vertical;min-height:54px;font-size:16px;
  line-height:1.55;margin-top:8px;background:transparent;color:var(--text);}

/* ---- \u30BF\u30B9\u30AF ---- */
.ta-tasks{background:var(--card);border-radius:var(--rad);overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05);}

.ta-task{position:relative;border-bottom:1px solid var(--sep);transition:background .15s,max-height .34s ease,opacity .3s ease;max-height:1200px;overflow:hidden;}

.ta-task-dragging{background:#f7f7fa;box-shadow:0 8px 20px rgba(0,0,0,.12);border-radius:12px;}
.ta-collapsing{max-height:0!important;opacity:0;padding:0!important;}
.ta-task-done{filter:grayscale(1);opacity:.6;}
.ta-task-main{display:flex;align-items:center;gap:11px;padding:12px 16px;}
.ta-grip{color:#c7c7cc;font-size:14px;letter-spacing:-3px;cursor:grab;touch-action:none;width:18px;}

/* \u30BF\u30B9\u30AF\u4E00\u89A7\uFF1A\u30D7\u30ED\u30B8\u30A7\u30AF\u30C8\u540D\u3092\u5225\u884C\u306B */
.ta-at-projline{display:flex;align-items:center;gap:6px;padding:0 16px 10px 53px;margin-top:-4px;
  font-size:12.5px;font-weight:600;color:var(--text2);}
.ta-at-dot{width:18px;height:18px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  color:#fff;flex:none;overflow:hidden;white-space:nowrap;line-height:1;}
.ta-at-projline-btn{background:transparent;}
.ta-at-projline-btn:active{opacity:.6;}
.ta-at-move{color:var(--blue);margin-left:4px;}
.ta-add-bar-quick{background:var(--card);border-radius:var(--rad);border-top:none;margin-bottom:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.05);}

/* \u5B8C\u4E86\u3057\u305F\u30BF\u30B9\u30AF\uFF08\u6298\u308A\u305F\u305F\u307F\uFF09*/
.ta-done-section{margin-top:14px;}
.ta-done-head{display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;font-size:14px;font-weight:700;
  color:var(--text2);background:var(--card);border-radius:var(--rad);box-shadow:0 1px 2px rgba(0,0,0,.05);}
.ta-done-caret{transform:rotate(0deg);transition:transform .2s;}
.ta-done-caret-open{transform:rotate(-90deg);}
.ta-done-count{margin-left:auto;background:#e5e5ea;color:var(--text2);border-radius:10px;padding:1px 9px;font-size:12px;}
.ta-tasks-done{margin-top:8px;}

/* \u30C1\u30A7\u30C3\u30AF\u6B04\uFF1A\u89D2\u4E38\u6B63\u65B9\u5F62 */
.ta-check{width:26px;height:26px;flex:none;border-radius:8px;border:2px solid #c7c7cc;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:all .15s;}
.ta-check-on{color:#fff;}
.ta-check-sm{width:21px;height:21px;border-radius:6px;}

/* \u671F\u9650\u30D6\u30ED\u30C3\u30AF\uFF1A\u89D2\u4E38\u6B63\u65B9\u5F62 */
.ta-dl-wrap{position:relative;flex:none;}
.ta-dl{width:48px;height:48px;border-radius:12px;background:#f2f2f7;display:flex;flex-direction:column;
  align-items:center;justify-content:center;line-height:1;transition:transform .12s,background .15s;color:var(--text2);}

.ta-dl-m{font-size:9.5px;font-weight:700;opacity:.95;}
.ta-dl-d{font-size:19px;font-weight:800;margin:1px 0;}

.ta-dl-empty{opacity:.6;}

.ta-task-text{flex:1;min-width:0;border:none;outline:none;font-size:16px;background:transparent;color:var(--text);
  resize:none;overflow:hidden;line-height:1.45;font-family:var(--font);padding:3px 0;display:block;word-break:break-word;}
.ta-done{text-decoration:line-through;color:var(--text2);}

.ta-mini-add,.ta-memo-btn{width:34px;height:34px;flex:none;border-radius:10px;background:#f2f2f7;
  display:flex;align-items:center;justify-content:center;color:var(--text2);transition:transform .12s,background .15s;}
.ta-mini-add:active,.ta-memo-btn:active{transform:scale(.9);}
.ta-memo-has{background:var(--accent);color:#fff;}
.ta-task-del{color:#ff3b30;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex:none;}

/* \u30DF\u30CB\u30BF\u30B9\u30AF */
.ta-subs{padding:0 16px 10px 53px;display:flex;flex-direction:column;gap:7px;}
.ta-sub{display:flex;align-items:center;gap:9px;}
.ta-sub-icon{color:#c7c7cc;flex:none;}
.ta-sub-text{flex:1;min-width:0;border:none;outline:none;font-size:16px;background:transparent;color:var(--text);
  resize:none;overflow:hidden;line-height:1.4;font-family:var(--font);padding:2px 0;word-break:break-word;}
.ta-sub-del{color:var(--text2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex:none;opacity:.6;}

/* \u8FFD\u52A0\u30D0\u30FC */
.ta-add-bar{display:flex;align-items:center;gap:10px;padding:13px 16px;border-top:1px solid var(--sep);}

.ta-add-bar input{flex:1;border:none;outline:none;font-size:16px;background:transparent;color:var(--text);}

/* ---- \u30DD\u30C3\u30D7\u30AA\u30FC\u30D0\u30FC\uFF08\u671F\u9650\uFF09---- */
/* ---- \u671F\u9650\u30D4\u30C3\u30AB\u30FC\uFF08\u4E2D\u592E\u30E2\u30FC\u30C0\u30EB\uFF1A\u898B\u5207\u308C\u9632\u6B62\uFF09---- */
.ta-dl-modal-bg{position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.32);display:flex;
  align-items:center;justify-content:center;padding:20px;animation:fade .18s;}
.ta-dl-modal{background:#fff;border-radius:20px;padding:14px 18px 18px;width:100%;max-width:320px;

  animation:popin .22s cubic-bezier(.2,.8,.2,1);}
@keyframes popin{from{transform:scale(.92);opacity:0;}}
.ta-dl-modal-head{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;}
.ta-pop-quick{display:flex;gap:8px;}
.ta-pop-quick button{flex:1;background:#f2f2f7;border-radius:11px;padding:11px 4px;font-size:14px;font-weight:600;color:var(--blue);}
.ta-pop-quick button:active{background:#e3e3ea;}
.ta-dl-modal input[type=date]{border:1px solid var(--sep);border-radius:11px;padding:11px 12px;font-size:16px;width:100%;color:var(--text);}
.ta-pop-clear{color:#ff3b30;font-size:14px;font-weight:600;padding:9px;border-radius:11px;background:#fff0f0;}

/* ---- \u30B7\u30FC\u30C8 ---- */
.ta-sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:50;display:flex;
  align-items:flex-end;justify-content:center;animation:fade .2s;}
@keyframes fade{from{opacity:0;}}
.ta-sheet{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:8px 20px 30px;
  animation:up .28s cubic-bezier(.2,.8,.2,1);}
@keyframes up{from{transform:translateY(100%);}}
.ta-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;font-weight:700;font-size:17px;}
.ta-field-label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.05em;margin:16px 0 7px;}
.ta-field{width:100%;border:1px solid var(--sep);border-radius:11px;padding:11px 13px;font-size:16px;outline:none;}
.ta-field:focus{border-color:var(--blue);}
.ta-emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}

.ta-recent-empty{font-size:13px;color:var(--text2);margin:2px 0 4px;background:#f2f2f7;border-radius:11px;padding:12px 14px;}
.ta-dl-field-label{font-size:12px;font-weight:700;color:var(--text2);margin:2px 0 -4px;}
.ta-dl-confirm{width:100%;text-align:center;padding:11px;}
.ta-dl-confirm:disabled{opacity:.4;cursor:default;}
.ta-color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.ta-swatch{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;

  padding:12px;border-radius:12px;background:#fff0f0;color:#ff3b30;font-weight:600;font-size:15px;}

/* ---- \u30E1\u30E2\u30A8\u30C7\u30A3\u30BF ---- */
.ta-memo-overlay{position:fixed;inset:0;z-index:60;background:#fbfbfd;display:flex;flex-direction:column;
  animation:slideUp .3s cubic-bezier(.2,.8,.2,1);}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}}

.ta-toolbar{display:flex;align-items:center;gap:6px;padding:9px 14px;border-top:1px solid var(--sep);
  overflow-x:auto;background:rgba(255,255,255,.97);flex:none;box-shadow:0 -2px 10px rgba(0,0,0,.05);}
.ta-toolbar-top{border-top:none;border-bottom:1px solid var(--sep);box-shadow:0 2px 8px rgba(0,0,0,.04);}
.ta-tool-group{display:flex;align-items:center;gap:4px;}
.ta-tool-ico{color:var(--text2);margin-right:2px;flex:none;}
.ta-tool{min-width:34px;height:34px;padding:0 8px;border-radius:9px;background:#f2f2f7;color:var(--text);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none;transition:background .12s;}
.ta-tool:active{background:#e0e0e6;}
.ta-tool-size{font-weight:700;}
.ta-tool-on{background:var(--blue)!important;color:#fff!important;}

/* \u753B\u50CF\u30B5\u30A4\u30BA\u30D0\u30FC */
.ta-img-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--sep);background:#f7f7fa;}
.ta-img-bar-label{font-size:13px;font-weight:700;color:var(--text2);margin-right:2px;}
.ta-img-bar button{background:#fff;border:1px solid var(--sep);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--blue);}
.ta-img-bar .ta-img-del{color:#ff3b30;display:inline-flex;align-items:center;gap:4px;border-color:#ffd0cc;}

.note-editor{flex:1;overflow-y:auto;padding:22px 26px 28px;font-size:17px;line-height:1.6;outline:none;

.note-editor .ta-checklist{list-style:none;}

.ta-filter-row{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid var(--sep);width:100%;text-align:left;}

.ta-filter-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;flex:none;overflow:hidden;white-space:nowrap;line-height:1;}
.ta-filter-name{flex:1;font-size:16px;font-weight:600;}
.ta-filter-row:disabled{opacity:.45;}
.ta-filter-on{color:var(--blue);}
.ta-filter-off{color:#c7c7cc;}

/* \u30B4\u30DF\u7BB1\u30FB\u5B8C\u4E86\u3057\u305F\u30D7\u30ED\u30B8\u30A7\u30AF\u30C8\uFF08\u6A2A\u9577\u30AB\u30FC\u30C9\uFF09*/
.ta-bin-row{display:flex;flex-direction:column;gap:10px;margin-top:26px;}
.ta-bin-card{display:flex;align-items:center;gap:12px;width:100%;background:#e9e9ee;color:#1c1c1e;

.ta-bin-card:active{background:#deded4;}

.ta-bin-count{background:#c7c7cc;color:#fff;border-radius:11px;padding:1px 10px;font-size:13px;min-width:26px;text-align:center;}
.ta-bin-proj{cursor:pointer;}

/* \u30B7\u30FC\u30C8\u5185\u306E\u64CD\u4F5C\u30DC\u30BF\u30F3 */
.ta-action-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;

  .ta-mini-add{display:flex;}
}

<!-- Firestore 同期ブリッジ(v6): 元アプリのコードは未変更。
     安全弁: 本物のクラウドデータを「空/初期サンプル」で上書きしない / 手付かずの初期画面は共有データを取り込む /
     上書き前に端末内バックアップ(保険) / 同期済み端末間は新しい方を採用 / 定期チェック / 状況表示 /
     v6: 再接続直後の「キャッシュ(古いクラウド値)」を土台に送信しない → サーバ確定値を得てからマージ送信する
         (オフライン端末が復帰時に相手の最新タスクを取りこぼし・上書きする不具合を修正) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc, getDocFromServer } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAr93zoGtmc3IaIiLnalzb3QDvW1Wlg_9w",
    authDomain: "task-app-c586e.firebaseapp.com",
    projectId: "task-app-c586e",
    storageBucket: "task-app-c586e.firebasestorage.app",
    messagingSenderId: "350937473724",
    appId: "1:350937473724:web:eb63cdd8a81950e133e6b9",
    measurementId: "G-91NWYMMPZW"
  };

  const STORAGE_KEY = "taskapp-state-v1";
  const REV_KEY     = "taskapp-sync-rev";
  const BACKUP_KEY  = "taskapp-backups";
  const BASE_KEY    = "taskapp-base";    // 前回同期した共通の土台(3-wayマージの基準)

  // ---- 同期ステータス表示 ----
  const badge=document.createElement("div");
  badge.style.cssText="position:fixed;left:8px;bottom:8px;z-index:99999;font:12px/1.4 -apple-system,system-ui,sans-serif;"+
    "padding:6px 10px;border-radius:14px;background:rgba(0,0,0,.72);color:#fff;max-width:80vw;"+
    "box-shadow:0 2px 8px rgba(0,0,0,.25);transition:opacity .4s;opacity:.95;pointer-events:none;";
  const setStatus=(text,color)=>{
    badge.textContent="☁️ "+text;
    if(color)badge.style.background=color;
    badge.style.opacity=".95";
    clearTimeout(setStatus._t);
    if(/同期OK|読み込み|保存しました/.test(text)){setStatus._t=setTimeout(()=>{badge.style.opacity="0";},2500);}
  };
  const mountUI=()=>{(document.body||document.documentElement).appendChild(badge);};
  if(document.body)mountUI(); else window.addEventListener("DOMContentLoaded",mountUI);
  setStatus("接続中…","rgba(0,0,0,.72)");

  // ---- アプリ本体(ミニファイ済み)へCSSを上乗せして表示・操作性を調整 ----
  (function injectCSS(){
    const css=
      "/* ③ プロジェクト詳細の下部「タスクを追加」バーだけを隠す(下中央の青ボタンに一本化)。\n"+
      "   タスク一覧画面(.ta-splitではない)のバーは残す */\n"+

      "/* ⑤ タスク一覧のインライン・クイック追加欄を隠す(『タスクを追加』ボタンに一本化。欄はDOMに残し駆動に使う) */\n"+
      ".ta-add-bar-quick{ display:none !important; }\n"+
      "/* ① メモの文字サイズ S:M:L:XL:XXL を 3:4:5:6:7 の均等な差にする */\n"+
      ".note-editor font[size=\"1\"]{ font-size:15px !important; }\n"+
      ".note-editor font[size=\"3\"]{ font-size:20px !important; }\n"+
      ".note-editor font[size=\"4\"]{ font-size:25px !important; }\n"+
      ".note-editor font[size=\"5\"]{ font-size:30px !important; }\n"+
      ".note-editor font[size=\"7\"]{ font-size:35px !important; }\n"+
      "/* ④⑤ 並び替えの『ポチポチ』を確実に掴めるように(スクロールに奪われない)＆長押しで文字選択させない */\n"+
      ".ta-grip, .ta-card-grip{ touch-action:none !important; }\n"+
      ".ta-card, .ta-bin-proj, .ta-rail-card{ -webkit-user-select:none !important; user-select:none !important; -webkit-touch-callout:none !important; }\n"+
      "/* ⑥ 左上のウインドウコントロール(•••)とUIが重ならないよう余白を確保 */\n"+
      ".ta-rail{ padding-top:56px !important; }\n"+
      ".ta-back{ margin-left:48px !important; }\n"+
      ".ta-memo-head{ padding-left:52px !important; }\n";
    const st=document.createElement("style"); st.textContent=css;
    (document.head||document.documentElement).appendChild(st);
  })();

  const now=()=>Date.now();
  const getRev=()=>Number(localStorage.getItem(REV_KEY)||0);
  const setRev=(t)=>{try{localStorage.setItem(REV_KEY,String(t));}catch{}};
  const setBase=(s)=>{try{ if(typeof s==="string") localStorage.setItem(BASE_KEY,s);}catch{}};
  const getBaseObj=()=>{ try{ return JSON.parse(localStorage.getItem(BASE_KEY)||"null"); }catch{ return null; } };

  // ---- 3-wayマージ (前回同期した土台を基準に、両側の差分を合体) ----
  function stable(v){
    if(v===null||typeof v!=="object") return JSON.stringify(v)||"null";
    if(Array.isArray(v)) return "["+v.map(stable).join(",")+"]";
    return "{"+Object.keys(v).sort().map(k=>JSON.stringify(k)+":"+stable(v[k])).join(",")+"}";
  }
  const eq=(a,b)=>stable(a)===stable(b);
  function hsh(s){ let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;} return h.toString(36); }
  function pick3(b,l,r){ if(eq(l,r))return l; if(eq(l,b))return r; if(eq(r,b))return l; return r; } // 競合はクラウド側(remote)優先
  function indexById(arr){ const m={}; (arr||[]).forEach(it=>{ if(it&&it.id!=null) m[String(it.id)]=it; }); return m; }
  function orderedIds(){ const seen={},out=[]; for(const arr of arguments){ (arr||[]).forEach(it=>{ if(it&&it.id!=null){ const id=String(it.id); if(!seen[id]){seen[id]=1;out.push(id);} } }); } return out; }

  // 出力順の決め方(並び替え対応の3-way順序マージ):
  //  ・誰も並び替えていなければ「クラウド順→手元だけの追加を末尾」(従来どおり。全端末で同一に収束しループしない)。
  //  ・片方だけが並び替えたら、その並びを採用する(= 並び替えが直後に元へ戻らない)。
  //  ・両方が別々に並び替えた競合はクラウド優先で決定(決定論的に収束)。
  function orderIds(arr){ const o=[]; (arr||[]).forEach(it=>{ if(it&&it.id!=null) o.push(String(it.id)); }); return o; }
  function sameRelOrder(a,b){ // 共通idだけの相対順が同じか(=並び替えが無かったか)
    const sb=new Set(b),sa=new Set(a);
    return a.filter(x=>sb.has(x)).join("")===b.filter(x=>sa.has(x)).join("");
  }
  function mergeOrderIds(bArr,lArr,rArr){
    const Bo=orderIds(bArr),Lo=orderIds(lArr),Ro=orderIds(rArr);
    const localMoved=!sameRelOrder(Lo,Bo), remoteMoved=!sameRelOrder(Ro,Bo);
    const primary = remoteMoved?Ro:(localMoved?Lo:Ro);   // 競合時/無変更時はクラウド優先
    const secondary = primary===Ro?Lo:Ro;
    const out=[],seen=new Set();
    const add=id=>{ if(id!=null&&!seen.has(id)){ seen.add(id); out.push(id);} };
    primary.forEach(add); secondary.forEach(add); Bo.forEach(add);
    return out;
  }

  function mergeTasks(bArr,lArr,rArr){
    const B=indexById(bArr),L=indexById(lArr),R=indexById(rArr),out=[];
    mergeOrderIds(bArr,lArr,rArr).forEach(id=>{
      const b=B[id],l=L[id],r=R[id],inB=id in B,inL=id in L,inR=id in R;
      if(inL&&inR){
        if(eq(l,r)) out.push(r);
        else if(inB&&eq(l,b)) out.push(r);          // 遠隔だけ変更
        else if(inB&&eq(r,b)) out.push(l);          // 手元だけ変更
        else { // 競合 → 両方残す(決定論的に複製)
          const cl=stable(l),cr=stable(r);
          const first = cl<cr ? l : r, second = cl<cr ? r : l;
          out.push(Object.assign({},first,{id:id}));
          out.push(Object.assign({},second,{id:id+"~d"+hsh(stable(second))}));
        }
      } else if(inL&&!inR){
        if(!(inB&&eq(l,b))) out.push(l);             // 追加 or 編集vs削除 → 残す
      } else if(inR&&!inL){
        if(!(inB&&eq(r,b))) out.push(r);
      }
    });
    return out;
  }

  // プロジェクト配列のマージ: 同IDは「tasksは個別マージ＋その他すべてのフィールド(deleted/完了等)を3-way合体」
  function mergeProjects(bArr,lArr,rArr){
    const B=indexById(bArr),L=indexById(lArr),R=indexById(rArr),out=[];
    mergeOrderIds(bArr,lArr,rArr).forEach(id=>{
      const b=B[id]||null,l=L[id],r=R[id],inB=id in B,inL=id in L,inR=id in R;
      if(inL&&inR){
        const merged=Object.assign({},r);   // フィールドの初期値はクラウド側を採用(出力順は mergeOrderIds で決定)
        const keys=new Set([].concat(b?Object.keys(b):[],Object.keys(l),Object.keys(r)));
        keys.forEach(k=>{
          if(k==="tasks") merged.tasks=mergeTasks(b?b.tasks:[], l.tasks||[], r.tasks||[]);
          else merged[k]=pick3(b?b[k]:undefined, l[k], r[k]);
        });
        out.push(merged);
      } else if(inL&&!inR){
        if(!(inB&&eq(l,b))) out.push(l);
      } else if(inR&&!inL){
        if(!(inB&&eq(r,b))) out.push(r);
      }
    });
    return out;
  }

  // id付き配列(なければ内容で和集合)の汎用マージ: 競合はクラウド優先
  function mergeArr(b,l,r){
    if(eq(l,r))return l; if(eq(l,b))return r; if(eq(r,b))return l;
    const hasId=(a)=>Array.isArray(a)&&a.length>0&&a.every(x=>x&&typeof x==="object"&&x.id!=null);
    if(hasId(l)||hasId(r)||hasId(b)){
      const B=indexById(b),L=indexById(l),R=indexById(r),out=[];
      mergeOrderIds(b,l,r).forEach(id=>{
        const bb=B[id],ll=L[id],rr=R[id],inB=id in B,inL=id in L,inR=id in R;
        if(inL&&inR) out.push(pick3(bb,ll,rr));
        else if(inL&&!inR){ if(!(inB&&eq(ll,bb))) out.push(ll); }
        else if(inR&&!inL){ if(!(inB&&eq(rr,bb))) out.push(rr); }
      });
      return out;
    }
    const out=[],seen={};
    (l||[]).concat(r||[]).forEach(x=>{ const k=stable(x); if(!seen[k]){seen[k]=1;out.push(x);} });
    return out;
  }

  function mergeState(base,local,remote){
    const b=base||{},l=local||{},r=remote||{};
    const out=Object.assign({},r);
    out.projects=mergeProjects(b.projects||[],l.projects||[],r.projects||[]);
    ["custom","recent","countdowns","hidden"].forEach(k=>{ out[k]=mergeArr(b[k]||[],l[k]||[],r[k]||[]); });
    out.headline=pick3(b.headline,l.headline,r.headline);
    return out;
  }

  function backup(label,value){
    if(!value)return;
    try{
      const arr=JSON.parse(localStorage.getItem(BACKUP_KEY)||"[]");
      arr.push({t:now(),label,value});
      while(arr.length>8)arr.shift();
      localStorage.setItem(BACKUP_KEY,JSON.stringify(arr));
    }catch{}
  }

  function isDefaultSample(s){
    try{
      const d=JSON.parse(s);
      const p=d.projects||[];
      if(p.length!==1) return false;
      if(p[0].name!=="サンプル") return false;
      const texts=(p[0].tasks||[]).map(t=>t&&t.text);
      if(texts.length!==2||texts[0]!=="企画書をまとめる"||texts[1]!=="メール文を考える") return false;
      const emptyArr=k=>Array.isArray(d[k])&&d[k].length===0;
      if(!emptyArr("custom")||!emptyArr("recent")||!emptyArr("countdowns")||!emptyArr("hidden")) return false;
      if((d.headline||"")!=="") return false;
      return true;
    }catch{ return false; }
  }
  const isEmptyOrDefault=(s)=> !s || isDefaultSample(s);

  const app=initializeApp(firebaseConfig);
  const db=getFirestore(app);
  // 名前空間(?ns=)があれば別ドキュメントで同期(「勉強」は taskapp/ns-study)。無ければ従来どおり shared。
  const NS=(typeof window!=="undefined" && window.__TASKAPP_NS__) ? String(window.__TASKAPP_NS__) : null;
  const stateRef=doc(db,"taskapp", NS ? ("ns-"+NS) : "shared");

  // ====== 同期エンジン(シンプル版) ======
  // 設計: 変化(クラウド受信 or 手元編集)があったら reconcile() だけが動く。
  //  ・「土台(前回同期点)」を更新するのは『手元とクラウドが一致した瞬間』だけ。
  //  ・反映の再読込中(reloadPending)は何もしない → 無限ループを根本から防ぐ。
  let ready=false;
  let applyingRemote=false;     // 手元へ書き戻し中(自分の書き込みを再処理しない)
  let reloadPending=false;      // 画面更新の再読込待ち(待ちの間は処理しない)
  let lastCloud=null;           // 直近に受信したクラウド内容(文字列 / 無ければ null)
  let lastCloudKnown=false;     // クラウド状態を一度でも受信したか
  let cloudFresh=false;         // いま手元のクラウド値が「サーバ確定の最新」か。再接続直後のキャッシュ(古い値)の
                                // 間は false にして、その値を土台に送信/反映しない(相手の変更の上書きを防ぐ)
  const origSetItem=Storage.prototype.setItem;
  const getLocal=()=>window.localStorage.getItem(STORAGE_KEY);
  const markReady=(msg)=>{ ready=true; if(msg) setStatus(msg,"rgba(20,140,70,.9)"); };

  // クラウドへ保存(本物データを空/初期サンプルで上書きしない安全弁つき)
  function pushCloud(value){
    // オフライン中は送らない(古い内容のまま予約送信されて他端末の変更を上書きするのを防ぐ)
    // → 回線復帰時に最新を読み直してマージしてから送る
    if(typeof navigator!=="undefined" && navigator.onLine===false){
      setStatus("オフライン(後で同期)","rgba(120,90,0,.92)");
      return Promise.resolve();
    }
    if(lastCloudKnown && lastCloud && !isEmptyOrDefault(lastCloud) && isEmptyOrDefault(value)){
      return Promise.resolve(); // 本物を空/初期で上書きしない
    }
    setStatus("保存中…","rgba(0,90,200,.85)");
    return setDoc(stateRef,{data:value,updatedAt:now()})
      .then(()=>setStatus("同期OK","rgba(20,140,70,.9)"))
      .catch((e)=>{console.error("[sync] 送信失敗:",e);setStatus("オフライン(後で同期)","rgba(120,90,0,.92)");});
  }

  // 手元へ反映して画面を最新化(再読込)。再入防止に reloadPending を立てる。
  function applyLocal(value){
    if(reloadPending) return;
    reloadPending=true;
    try{ sessionStorage.setItem("taskapp-scroll",String(window.scrollY||0)); }catch{}
    backup("before-apply",getLocal());
    applyingRemote=true; origSetItem.call(window.localStorage,STORAGE_KEY,value); applyingRemote=false;
    setStatus("最新を反映中…","rgba(0,90,200,.85)");
    location.reload();
  }

  // 安全弁の判定用: 本物データの「量」(削除されていないプロジェクト数と総タスク数)を測る
  function weight(str){
    try{ const d=JSON.parse(str); let t=0,p=0;
      (d.projects||[]).forEach(x=>{ if(x&&!x.deleted){ p++; t+=(x.tasks||[]).length; } });
      return {t,p};
    }catch{ return {t:0,p:0}; }
  }
  // クラウド側の欠落で「手元の本物データが大量に消える」マージかどうか
  // (= 手元は本物で十分な量がある のに マージ結果がサンプル/空 か 大半を失う)
  function isWipe(localStr, mergedStr){
    if(isEmptyOrDefault(localStr)) return false;          // 手元が元々サンプル/空なら保護不要
    if(isEmptyOrDefault(mergedStr)) return true;          // 本物→サンプル/空 への激減は常に異常
    const L=weight(localStr), M=weight(mergedStr);
    return L.t>=10 && M.t < Math.ceil(L.t*0.4);           // タスクが4割未満に激減
  }

  // 中核: クラウド・手元・土台 を見て、必要な分だけ送る/取り込む。
  function reconcile(){
    if(RECOVER||reloadPending||applyingRemote||!lastCloudKnown||!cloudFresh) return;
    const local=getLocal();

    if(lastCloud===null){                                   // クラウドが空 → 本物の手元データだけ登録
      if(local && !isEmptyOrDefault(local)) pushCloud(local);
      markReady("同期OK"); return;
    }
    const cloud=lastCloud;

    if(local===cloud){ setBase(local); markReady("同期OK"); return; } // 一致 = ここだけ土台を更新

    if(isDefaultSample(local)){ applyLocal(cloud); return; }          // 手付かず端末 → クラウドを取り込む
    if(isEmptyOrDefault(cloud) && !isEmptyOrDefault(local)){ pushCloud(local); markReady(); return; } // クラウド初期化 → 手元で回復

    // 両方に本物データ → 3-wayマージ(両方の追加・編集を残す)
    let merged;
    try{ merged=JSON.stringify(mergeState(getBaseObj(), JSON.parse(local), JSON.parse(cloud))); }
    catch(e){ console.error("[sync] マージ失敗:",e); return; }
    const pushNeeded = merged!==cloud;
    const localNeeded = merged!==local;
    // ★安全弁: クラウドの欠落で手元の本物データが大量消失するマージは取り込まない(カスケード消失＆ループの防止)
    if(localNeeded && isWipe(local, merged)){
      backup("guard-blocked-wipe", local);
      const C=weight(cloud), L=weight(local);
      console.warn("[sync] 大量消失を検知→取り込み中止. local=",L,"cloud=",C);
      setStatus("⚠データ保護: 取り込み中止","rgba(150,0,0,.92)");
      if(C.t < L.t) pushCloud(local);   // クラウドが小さい(壊れている)→ 本物を送って回復(自己修復)
      markReady(); return;              // applyLocalしない=画面の本物を守る&再読込ループを止める
    }
    if(localNeeded){ if(pushNeeded) pushCloud(merged); applyLocal(merged); } // 画面更新あり(土台は再読込後に一致して更新)
    else if(pushNeeded){ pushCloud(merged); markReady(); }                   // 送るだけ(echoで一致したら土台更新)
  }

  // ---- 復元モード(?recover のときだけ表示。自動同期は止めて安全に控えから戻す) ----
  const RECOVER=(new URLSearchParams(location.search)).has("recover")||/recover/.test(location.hash);
  const fmtTime=(t)=>{try{return new Date(t).toLocaleString();}catch{return String(t);}};
  const countTasks=(s)=>{try{const d=JSON.parse(s);return (d.projects||[]).reduce((a,p)=>a+((p.tasks||[]).length),0);}catch{return 0;}};
  const countProjects=(s)=>{try{const d=JSON.parse(s);return (d.projects||[]).length;}catch{return 0;}};

  function buildRecoveryUI(){
    const wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;inset:0;z-index:100000;background:#fff;color:#111;overflow:auto;"+
      "font:15px/1.6 -apple-system,system-ui,sans-serif;padding:20px;box-sizing:border-box;";
    const esc=(s)=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
    let backups=[]; try{backups=JSON.parse(localStorage.getItem(BACKUP_KEY)||"[]");}catch{}
    const cur=localStorage.getItem(STORAGE_KEY);
    let html="<h2 style='margin:0 0 8px'>🛟 復元モード</h2>";
    html+="<p style='color:#555;margin:0 0 16px'>この端末に残っている控えから、タスクを元に戻せます。「これを復元」で全端末へ反映、「📋 書き出す」でテキストとして保存できます（クラウドが不調でも安全に取り出せます）。このモードでは自動同期は止まっています。</p>";
    html+="<div style='border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:12px'>";
    html+="<b>いまこの端末の表示内容</b><br>プロジェクト "+countProjects(cur)+"件 / タスク "+countTasks(cur)+"件";
    html+="<br><button data-cur='1' style='margin-top:8px;padding:8px 12px;border:0;border-radius:8px;background:#007aff;color:#fff'>この内容をクラウドへ復元</button>"+
      " <button data-expcur='1' style='margin-top:8px;padding:8px 12px;border:0;border-radius:8px;background:#555;color:#fff'>📋 書き出す</button></div>";
    html+="<h3 style='margin:16px 0 8px'>端末内の控え（新しい順）</h3>";
    if(!backups.length){
      html+="<p style='color:#a00'>この端末には控えが見つかりませんでした。よく使っていた別の端末で、同じURLに <code>?recover</code> を付けて開いてみてください。</p>";
    }else{
      for(let i=backups.length-1;i>=0;i--){
        const b=backups[i];
        html+="<div style='border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px'>";
        html+="<div style='color:#555;font-size:13px'>"+esc(fmtTime(b.t))+" ／ "+esc(b.label||"")+"</div>";
        html+="プロジェクト "+countProjects(b.value)+"件 / タスク "+countTasks(b.value)+"件";
        html+="<br><button data-idx='"+i+"' style='margin-top:8px;padding:8px 12px;border:0;border-radius:8px;background:#148a46;color:#fff'>これを復元</button>"+
          " <button data-exp='"+i+"' style='margin-top:8px;padding:8px 12px;border:0;border-radius:8px;background:#555;color:#fff'>📋 書き出す</button></div>";
      }
    }
    html+="<div style='margin-top:20px'><button data-close='1' style='padding:8px 12px;border:1px solid #ccc;border-radius:8px;background:#f2f2f2'>閉じる（通常画面へ）</button></div>";
    wrap.innerHTML=html;
    const baseUrl=location.origin+location.pathname;
    function doRestore(value){
      if(!value){alert("内容が空です。");return;}
      if(!confirm("この内容（タスク"+countTasks(value)+"件）をこの端末に復元します。よろしいですか？\n（クラウドへは通信が回復し次第、この端末から自動反映されます）"))return;
      applyingRemote=true; origSetItem.call(localStorage,STORAGE_KEY,value); applyingRemote=false;
      setBase(value);   // 土台も復元値に合わせる(復帰直後の誤判定で再び消えるのを防ぐ)
      setRev(now());
      setDoc(stateRef,{data:value,updatedAt:now()}).then(()=>{
        alert("復元しました（クラウドへも反映済み）。通常画面に戻ります。");
        location.href=baseUrl;
      }).catch((e)=>{
        alert("この端末には復元しました。クラウドは現在混雑（容量制限）のため、通信回復後に自動で反映されます。\n通常画面に戻ります。");
        location.href=baseUrl;
      });
    }
    function exportValue(value){
      if(!value){ alert("内容が空です。"); return; }
      const back=document.createElement("div");
      back.style.cssText="position:fixed;inset:0;z-index:100002;background:rgba(0,0,0,.5);display:flex;flex-direction:column;padding:16px;box-sizing:border-box";
      back.innerHTML="<div style='color:#fff;margin-bottom:8px'>下のテキスト（タスク"+countTasks(value)+"件）を全選択してコピーし、メモ等に保存してください。</div>";
      const ta=document.createElement("textarea"); ta.readOnly=true; ta.value=value;
      ta.style.cssText="flex:1;width:100%;box-sizing:border-box;font:12px/1.4 monospace;padding:10px;border-radius:8px;border:0";
      const row=document.createElement("div"); row.style.cssText="display:flex;gap:8px;margin-top:8px";
      const cp=document.createElement("button"); cp.textContent="コピー"; cp.style.cssText="flex:1;padding:12px;border:0;border-radius:8px;background:#007aff;color:#fff;font-weight:700";
      const cl=document.createElement("button"); cl.textContent="閉じる"; cl.style.cssText="flex:1;padding:12px;border:0;border-radius:8px;background:#eee;color:#111";
      cp.onclick=()=>{ try{ ta.focus(); ta.select(); ta.setSelectionRange(0,value.length); }catch{} let ok=false; try{ ok=document.execCommand("copy"); }catch{} try{ navigator.clipboard&&navigator.clipboard.writeText&&navigator.clipboard.writeText(value); }catch{} alert(ok?"コピーしました。":"テキストを長押し→全選択→コピーして保存してください。"); };
      cl.onclick=()=>back.remove();
      row.appendChild(cp); row.appendChild(cl); back.appendChild(ta); back.appendChild(row);
      (document.body||document.documentElement).appendChild(back);
      try{ ta.focus(); ta.select(); }catch{}
    }
    wrap.addEventListener("click",(ev)=>{
      const t=ev.target;
      if(t.dataset.close){ location.href=baseUrl; return; }
      if(t.dataset.cur){ doRestore(cur); return; }
      if(t.dataset.idx!=null){ const b=backups[Number(t.dataset.idx)]; doRestore(b&&b.value); return; }
      if(t.dataset.expcur){ exportValue(cur); return; }
      if(t.dataset.exp!=null){ const b=backups[Number(t.dataset.exp)]; exportValue(b&&b.value); return; }
    });
    const mount=()=>{(document.body||document.documentElement).appendChild(wrap);};
    if(document.body)mount(); else window.addEventListener("DOMContentLoaded",mount);
  }
  if(RECOVER) buildRecoveryUI();

  // 1) アプリがタスクを保存したら、少し待って(まとめて)同期する
  let editTimer=null;
  Storage.prototype.setItem=function(key,value){
    origSetItem.call(this,key,value);
    if(this===window.localStorage&&key===STORAGE_KEY&&!applyingRemote&&!reloadPending&&!RECOVER){
      clearTimeout(editTimer);
      editTimer=setTimeout(reconcile,600);   // キー入力をまとめてから同期(書き込み回数を抑える)
    }
  };

  // 2) クラウドの変化をリアルタイム購読 → reconcile に一本化
  if(!RECOVER) onSnapshot(stateRef,{includeMetadataChanges:true},(snap)=>{
    if(snap.exists()){
      const d=snap.data().data;
      lastCloud=(typeof d==="string")?d:null;
    }else{
      lastCloud=null;
    }
    lastCloudKnown=true;
    // fromCache=true は「再接続直後などに出る“古いキャッシュ値”」。これを土台に送信すると
    // 相手の最新変更を上書きしてしまう(本バグの原因)。サーバ確定値(fromCache=false)のときだけ同期を動かす。
    cloudFresh = !!(snap.metadata && snap.metadata.fromCache===false);
    if(!cloudFresh && navigator.onLine===false) setStatus("オフライン(後で同期)","rgba(120,90,0,.92)");
    reconcile();
  },(e)=>{console.error("[sync] 受信エラー:",e);setStatus("オフライン","rgba(120,90,0,.92)");});

  // 4) サービスワーカー登録: オンライン時は常に最新版を読み込む(古いキャッシュで初期化される問題を防ぐ)
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch((e)=>console.warn("[sw] 登録失敗:",e)); });
  }

  // 5) オンライン復帰時: まず最新のクラウドを読み直し、それからマージして送る
  //    (古い内容で上書きしないため。これがオフライン変更を安全に合体させる肝)
  window.addEventListener("online",()=>{
    if(RECOVER||reloadPending) return;
    // 復帰時は“サーバから”最新を読み直す(キャッシュではなく確定値)。これを土台にマージするので
    // 相手の変更を取りこぼさない。読めたら cloudFresh=true にして同期を許可する。
    getDocFromServer(stateRef).then((snap)=>{
      lastCloud = snap.exists() ? (typeof snap.data().data==="string"?snap.data().data:null) : null;
      lastCloudKnown=true;
      cloudFresh=true;
      reconcile();
    }).catch((e)=>console.warn("[sync] 復帰時の取得失敗:",e));
  });

  // オフラインになったら「いま持っているクラウド値はもう当てにならない」とみなす。
  // 次にサーバ確定値を受け取るまで送信/反映を止め、古い値で相手の変更を上書きするのを防ぐ。
  window.addEventListener("offline",()=>{ cloudFresh=false; setStatus("オフライン(後で同期)","rgba(120,90,0,.92)"); });

  // ---- メモ内の添付ファイル/リンクをタップで開けるようにする ----
  // アプリのメモ欄は contenteditable で、その中の <a>(添付ファイル=data: URL, リンク)は
  // 標準ではタップしても開けない(iOSは data:/download も不可)。ここで肩代わりして開く。
  function dataURLtoBlob(dataURL){
    const c=dataURL.indexOf(","), head=dataURL.slice(0,c), body=dataURL.slice(c+1);
    const mime=(head.match(/data:([^;]+)/)||[])[1]||"application/octet-stream";
    let bytes;
    if(/;base64/i.test(head)){ const bin=atob(body); bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); }
    else { const txt=decodeURIComponent(body); bytes=new Uint8Array(txt.length); for(let i=0;i<txt.length;i++) bytes[i]=txt.charCodeAt(i); }
    return new Blob([bytes],{type:mime});
  }
  function openNoteHref(a){
    const href=a.getAttribute("href")||"";
    const name=a.getAttribute("download")||"file";
    try{
      if(/^data:/.test(href)){
        // data: URL を「同期」で Blob 化してから開く(awaitを挟まずタップ操作の流れを保つ=iOSでブロックされない)
        const url=URL.createObjectURL(dataURLtoBlob(href));
        const w=window.open(url,"_blank");
        if(!w){ const t=document.createElement("a"); t.href=url; t.download=name; document.body.appendChild(t); t.click(); t.remove(); }
        setTimeout(()=>URL.revokeObjectURL(url),60000);
      }else if(href){
        window.open(href,"_blank","noopener");
      }
    }catch(e){ console.warn("[note] 添付を開けませんでした:",e); }
  }
  document.addEventListener("click",(ev)=>{
    const t=ev.target;
    const a=t&&t.closest&&t.closest("a.ta-note-file, a.ta-note-link");
    if(!a) return;
    ev.preventDefault(); ev.stopPropagation();   // 編集挿入点の移動などを止めてファイルを開く
    openNoteHref(a);
  },true);   // capture段階で先取りする

  // ③ メモへの貼り付けを安全化: 余計な書式(白文字/背景/壊れた箇条書きHTML等)を取り除き、
  //   このメモで編集できる「素のテキスト(改行は保持)」として挿入する。
  document.addEventListener("paste",(ev)=>{
    const ed=ev.target && ev.target.closest && ev.target.closest(".note-editor");
    if(!ed) return;
    ev.preventDefault(); ev.stopPropagation();   // アプリ既定の貼り付け処理より先に横取り
    let text="";
    try{ const cd=ev.clipboardData||window.clipboardData; text=(cd&&cd.getData&&cd.getData("text/plain"))||""; }catch{}
    if(!text) return;
    ed.focus();
    // insertText は input イベントを発火するのでアプリ側の自動保存もそのまま動く
    try{ document.execCommand("insertText",false,text); }catch{}
  },true);   // capture段階で先取り

  // ② メモの「太字」をどの文字サイズでも効くようにする。
  //   アプリ既定の太字は CSS の font-weight スパンで、文字サイズの <font> タグと相性が悪く
  //   (iOS/Safari)「Lサイズしか太字にできない／サイズ変更で太字が外れる」状態だった。
  //   そこで太字ボタンを横取りし、意味タグ <b>(styleWithCSS=false)で適用する。<b> は <font size> と
  //   きれいに入れ子になり、queryCommandState でも確実に検出されるため、状態表示(B)も保たれる。
  let memoSavedRange=null;
  const inNoteSel=(sel)=>{ const ed=document.querySelector(".note-editor"); return ed && sel && sel.rangeCount && ed.contains(sel.anchorNode); };
  document.addEventListener("pointerdown",(ev)=>{
    if(!(ev.target.closest && ev.target.closest('[title="太字"]'))) return;
    const sel=document.getSelection&&document.getSelection();
    if(inNoteSel(sel)) memoSavedRange=sel.getRangeAt(0).cloneRange();   // 選択範囲を控える
    ev.preventDefault();   // ボタンへフォーカス移動させず、エディタの選択を保持
  },true);
  document.addEventListener("click",(ev)=>{
    const b=ev.target.closest && ev.target.closest('[title="太字"]');
    if(!b) return;
    ev.preventDefault(); ev.stopPropagation();   // アプリ既定の太字(CSSスパン)を止めて、こちらで<b>を適用
    const ed=document.querySelector(".note-editor"); if(!ed) return;
    try{
      ed.focus();
      if(memoSavedRange){ const sel=document.getSelection(); sel.removeAllRanges(); sel.addRange(memoSavedRange); }
      document.execCommand("styleWithCSS",false,false);   // ← CSSではなく<b>タグで太字にする(サイズと共存)
      document.execCommand("bold",false,null);
    }catch(e){ console.warn("[memo] 太字の適用に失敗:",e); }
  },true);   // capture段階で先取り

  // ====== ゴミ箱の複数選択削除(iOS風)。アプリ本体はミニファイ済みのため、ここから上乗せ実装 ======
  if(!RECOVER){
    const TRASH_TITLE="ゴミ箱";
    const escH=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    const readState=()=>{ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"null"); }catch{ return null; } };
    // いま「ゴミ箱」画面か?(.ta-bin-view + 見出しが「ゴミ箱」+ 削除済みカードがある)
    function trashViewVisible(){
      const v=document.querySelector(".ta-bin-view");
      if(!v) return false;
      const h=v.querySelector(".ta-content-head h2");
      if(!h || h.textContent.trim()!==TRASH_TITLE) return false;
      return !!v.querySelector(".ta-bin-proj");
    }
    // フローティング「選択」ボタン(ゴミ箱画面のときだけ表示)
    const selBtn=document.createElement("button");
    selBtn.type="button"; selBtn.textContent="選択";
    selBtn.style.cssText="position:fixed;top:max(10px,env(safe-area-inset-top,0px));right:12px;z-index:99998;"+
      "font:600 15px/1 -apple-system,system-ui,sans-serif;color:#fff;background:#007aff;border:0;"+
      "padding:9px 15px;border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.25);display:none;";
    selBtn.addEventListener("click",openTrashManager);
    const mountSel=()=>{ (document.body||document.documentElement).appendChild(selBtn); };
    if(document.body)mountSel(); else window.addEventListener("DOMContentLoaded",mountSel);

    // いまプロジェクト詳細画面か?(.ta-split のレールに選択中カードがある)
    function activeRailIndex(){
      const cards=[...document.querySelectorAll(".ta-rail-card")];
      return cards.findIndex(el=>el.classList.contains("ta-rail-active"));
    }
    const detailViewVisible=()=>activeRailIndex()>=0;
    // 「タスク一覧」表示中か(=インボックスのクイック追加欄が存在する。CSSで隠していてもDOMには在る)
    const listViewVisible=()=> !!document.querySelector(".ta-add-bar-quick");
    // 詳細画面で開いている対象プロジェクトを特定(レールの並び=有効プロジェクトの並びと一致)
    function currentProject(st){
      const list=(st&&Array.isArray(st.projects))?st.projects.filter(p=>p&&!p.deleted&&!p.completed):[];
      const idx=activeRailIndex();
      let p=(idx>=0&&idx<list.length)?list[idx]:null;
      const h=document.querySelector(".ta-split .ta-content-head h2");   // 見出し名でも照合(ずれ対策)
      const nm=h?h.textContent.trim():null;
      if(nm && (!p||p.name!==nm)){ const byName=list.filter(q=>q.name===nm); if(byName.length===1) p=byName[0]; }
      return p;
    }
    // フローティング「タスクを追加」ボタン(プロジェクト詳細画面のときだけ表示／内容＋期限＋メモを入力)
    const addBtn=document.createElement("button");
    addBtn.type="button"; addBtn.textContent="タスクを追加";
    addBtn.style.cssText="position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom,0px));z-index:99998;"+
      "font:600 16px/1 -apple-system,system-ui,sans-serif;color:#fff;background:#007aff;border:0;"+
      "padding:14px 28px;border-radius:24px;box-shadow:0 3px 12px rgba(0,0,0,.3);display:none;";
    addBtn.addEventListener("click",()=>{ if(detailViewVisible()) openComposer({mode:"project"}); else if(listViewVisible()) openComposer({mode:"inbox"}); });
    const mountAdd=()=>{ (document.body||document.documentElement).appendChild(addBtn); };
    if(document.body)mountAdd(); else window.addEventListener("DOMContentLoaded",mountAdd);

    function refreshUI(){
      selBtn.style.display = trashViewVisible() ? "block" : "none";
      // ② メモ(.ta-memo-overlay)を開いている間は「タスクを追加」ボタンを隠す
      const memoOpen=!!document.querySelector(".ta-memo-overlay");
      // ⑤ プロジェクト詳細だけでなく「タスク一覧」でも「タスクを追加」ボタンを表示
      addBtn.style.display = ((detailViewVisible() || listViewVisible()) && !memoOpen) ? "block" : "none";
    }
    const mo=new MutationObserver(()=>{ clearTimeout(refreshUI._t); refreshUI._t=setTimeout(refreshUI,80); });
    const startMO=()=>{ try{ mo.observe(document.body,{childList:true,subtree:true}); }catch{} refreshUI(); };
    if(document.body)startMO(); else window.addEventListener("DOMContentLoaded",startMO);

    function openTrashManager(){
      const st=readState();
      const deleted=(st&&Array.isArray(st.projects))?st.projects.filter(p=>p&&p.deleted):[];
      if(!deleted.length){ alert("ゴミ箱は空です。"); return; }
      const selected=new Set();   // 選択中のプロジェクトid

      const ov=document.createElement("div");
      ov.style.cssText="position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.35);"+
        "display:flex;flex-direction:column;justify-content:flex-end;font:15px/1.5 -apple-system,system-ui,sans-serif;";
      const sheet=document.createElement("div");
      sheet.style.cssText="background:#f2f2f7;color:#111;border-radius:16px 16px 0 0;max-height:86vh;"+
        "display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,0px);";
      ov.appendChild(sheet);

      function render(){
        const all=selected.size===deleted.length;
        let rows="";
        deleted.forEach((p,idx)=>{
          const on=selected.has(p.id);
          const cnt=(p.tasks||[]).length;
          rows+=`<div data-idx="${idx}" style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#fff;border-bottom:1px solid #e5e5ea;cursor:pointer">`+
            `<span style="width:22px;height:22px;border-radius:50%;flex:none;border:2px solid ${on?"#007aff":"#c7c7cc"};background:${on?"#007aff":"#fff"};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px">${on?"✓":""}</span>`+
            `<span style="font-size:22px;flex:none">${escH(p.emoji||"📁")}</span>`+
            `<span style="flex:1;min-width:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(p.name||"(無題)")}</span>`+
            `<span style="color:#8e8e93;font-size:13px;flex:none">${cnt}件</span>`+
          `</div>`;
        });
        sheet.innerHTML=
          `<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex:none">`+
            `<button data-act="cancel" style="background:none;border:0;color:#007aff;font-size:16px;padding:4px 2px">キャンセル</button>`+
            `<b style="font-size:16px">ゴミ箱を整理</b>`+
            `<button data-act="all" style="background:none;border:0;color:#007aff;font-size:16px;padding:4px 2px">${all?"全解除":"全選択"}</button>`+
          `</div>`+
          `<div style="overflow:auto;-webkit-overflow-scrolling:touch;border-top:1px solid #e5e5ea;border-bottom:1px solid #e5e5ea;flex:1 1 auto">${rows}</div>`+
          `<div style="padding:12px 16px 16px;flex:none">`+
            `<button data-act="del" ${selected.size?"":"disabled"} style="width:100%;padding:14px;border:0;border-radius:12px;font-size:16px;font-weight:700;color:#fff;background:${selected.size?"#ff3b30":"#ffb3ae"}">`+
              `選択した${selected.size}件を完全に削除`+
            `</button>`+
          `</div>`;
      }
      render();

      sheet.addEventListener("click",(ev)=>{
        const row=ev.target.closest("[data-idx]");
        if(row){ const p=deleted[Number(row.getAttribute("data-idx"))]; if(p){ selected.has(p.id)?selected.delete(p.id):selected.add(p.id); render(); } return; }
        const act=ev.target.closest("[data-act]"); if(!act) return;
        const a=act.getAttribute("data-act");
        if(a==="cancel") ov.remove();
        else if(a==="all"){ if(selected.size===deleted.length) selected.clear(); else deleted.forEach(p=>selected.add(p.id)); render(); }
        else if(a==="del") doDelete();
      });
      ov.addEventListener("click",(ev)=>{ if(ev.target===ov) ov.remove(); });

      function doDelete(){
        if(!selected.size) return;
        if(!confirm("選択した"+selected.size+"件を完全に削除します。\n元に戻せません。よろしいですか?")) return;
        const fresh=readState();
        if(!fresh||!Array.isArray(fresh.projects)){ alert("削除に失敗しました(データ未取得)。"); return; }
        try{ backup("before-trash-purge",localStorage.getItem(STORAGE_KEY)); }catch{}
        fresh.projects=fresh.projects.filter(p=>!(p&&p.deleted&&selected.has(p.id)));   // 完全削除=配列から除去
        try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(fresh)); }   // フック付きsetItem→保存&同期予約
        catch(e){ alert("保存に失敗しました: "+(e&&e.message||e)); return; }
        ov.remove();
        location.reload();   // アプリ表示を更新(リロード後に削除がクラウドへ反映される)
      }

      (document.body||document.documentElement).appendChild(ov);
    }

    // 新規タスクを「内容＋期限＋メモ」をまとめて入力して追加(詳細画面の現在のプロジェクトへ)
    const newId=()=>"t"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    function textToMemoHTML(t){
      t=(t||"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
      if(!t.trim()) return "";
      return t.split("\n").map(line=>"<div>"+(escH(line)||"<br>")+"</div>").join("");   // アプリのメモはHTML。改行を<div>で保持
    }
    // 入力欄(React制御)へ値を入れて変更を通知するための native setter
    function setNativeValue(el,val){
      try{ const d=Object.getOwnPropertyDescriptor(Object.getPrototypeOf(el),"value"); if(d&&d.set){ d.set.call(el,val); return; } }catch{}
      el.value=val;
    }
    // 状態全体を走査してタスク風オブジェクトのidを集める/特定する(インボックスの保存場所に依存しない)
    function collectTaskIds(o,set){ set=set||new Set();
      if(!o||typeof o!=="object") return set;
      if(Array.isArray(o)){ o.forEach(x=>collectTaskIds(x,set)); return set; }
      if(o.id!=null && ("text" in o || "subtasks" in o)) set.add(o.id);
      for(const k in o) collectTaskIds(o[k],set);
      return set;
    }
    function findTaskById(o,id){
      if(!o||typeof o!=="object") return null;
      if(Array.isArray(o)){ for(const x of o){ const r=findTaskById(x,id); if(r) return r; } return null; }
      if(o.id===id && ("text" in o || "subtasks" in o)) return o;
      for(const k in o){ const r=findTaskById(o[k],id); if(r) return r; }
      return null;
    }
    // インボックスへ追加: アプリ自身のクイック追加欄を駆動(保存場所を推測しない)。期限/メモは追加後に差分で特定して付与
    function addToInbox(text,date,memo){
      const bar=document.querySelector(".ta-add-bar-quick");
      const input=bar&&bar.querySelector("input");
      if(!input){ alert("「タスク一覧」を開いてからお試しください。"); return; }
      const before=collectTaskIds(readState());
      setNativeValue(input,text);
      input.dispatchEvent(new Event("input",{bubbles:true}));
      let tries=0;
      (function go(){
        const pill=bar.querySelector("button.ta-pill");           // 追加ピル出現=React反映の合図
        if(pill){ pill.click(); afterAdd(); return; }
        if(tries++<40){ setTimeout(go,50); return; }
        input.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter",keyCode:13,which:13,bubbles:true})); afterAdd();
      })();
      function afterAdd(){
        if(!date && !memo) return;                                 // 内容のみ→アプリが即反映済み(リロード不要)
        let t2=0;
        (function patch(){
          const stt=readState(); const after=collectTaskIds(stt);
          let nid=null; after.forEach(id=>{ if(!before.has(id)) nid=id; });
          const t=nid?findTaskById(stt,nid):null;
          if(t){
            if(date) t.deadline=date; if(memo) t.memo=memo;
            try{ backup("before-inbox-meta",localStorage.getItem(STORAGE_KEY)); }catch{}
            try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(stt)); }catch(e){}
            location.reload();   // 期限/メモを画面へ反映(＋同期)
            return;
          }
          if(t2++<40) setTimeout(patch,50);
        })();
      }
    }

    // 内容＋期限＋メモをまとめて追加。mode:"project"(現在のプロジェクト固定) / "inbox"(タスク一覧。既定インボックス＋追加先選択可)
    function openComposer(opts){
      opts=opts||{};
      const st=readState();
      const projects=(st&&Array.isArray(st.projects))?st.projects.filter(p=>p&&!p.deleted&&!p.completed):[];
      let dest;
      if(opts.mode==="project"){
        const proj=currentProject(st);
        if(!proj){ alert("追加先のプロジェクトが特定できませんでした。プロジェクトを開いてからお試しください。"); return; }
        dest={type:"project",id:proj.id,emoji:proj.emoji,name:proj.name};
      } else { dest={type:"inbox"}; }
      const pickable = opts.mode!=="project";

      const ov=document.createElement("div");
      ov.style.cssText="position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.35);font:15px/1.5 -apple-system,system-ui,sans-serif;";
      const sheet=document.createElement("div");
      // ② シートは visualViewport(キーボード除く可視領域)の下端へアンカー。オートフォーカス時に上へ突き抜けない
      sheet.style.cssText="position:fixed;left:0;right:0;bottom:0;z-index:100002;background:#f2f2f7;color:#111;border-radius:16px 16px 0 0;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,0px);";
      const vv=window.visualViewport;
      function place(){
        if(vv){
          const gap=Math.max(0, window.innerHeight-(vv.offsetTop+vv.height));   // キーボード等の下端余白
          sheet.style.bottom=gap+"px";
          sheet.style.maxHeight=(vv.height-8)+"px";
        }
      }
      function close(){ try{ if(vv){ vv.removeEventListener("resize",place); vv.removeEventListener("scroll",place); } }catch{} ov.remove(); sheet.remove(); }
      const fld="width:100%;box-sizing:border-box;border:0;border-radius:10px;background:#fff;padding:13px 14px;font-size:16px;color:#111;";
      const destLabel=()=> dest.type==="inbox" ? "📥 インボックス（あとで分類）" : (escH(dest.emoji||"📁")+" "+escH(dest.name||"(無題)"));
      const destRow=()=> pickable
        ? `<button data-act="dest" style="text-align:left;background:#fff;border:0;border-radius:10px;padding:11px 14px;color:#111;font-size:15px"><span style="color:#8e8e93">追加先：</span>${destLabel()} <span style="color:#007aff">▾</span></button>`
        : `<div style="color:#8e8e93;font-size:13px;margin-top:2px">追加先：${destLabel()}</div>`;
      function paint(){
        sheet.innerHTML=
          `<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex:none">`+
            `<button data-act="cancel" style="background:none;border:0;color:#007aff;font-size:16px;padding:4px 2px">キャンセル</button>`+
            `<b style="font-size:16px">新規タスク</b>`+
            `<button data-act="add" style="background:none;border:0;color:#007aff;font-size:16px;font-weight:700;padding:4px 2px">追加</button>`+
          `</div>`+
          `<div style="overflow:auto;-webkit-overflow-scrolling:touch;padding:4px 16px 16px;display:flex;flex-direction:column;gap:14px">`+
            destRow()+
            `<div><div style="font-size:13px;color:#8e8e93;margin:0 2px 5px">内容</div><input data-f="text" type="text" placeholder="タスクの内容" style="${fld}"></div>`+
            `<div><div style="font-size:13px;color:#8e8e93;margin:0 2px 5px">期限（任意）</div><input data-f="date" type="date" style="${fld}"></div>`+
            `<div><div style="font-size:13px;color:#8e8e93;margin:0 2px 5px">メモ（任意）</div><textarea data-f="memo" rows="4" placeholder="メモを入力…" style="${fld}resize:vertical;min-height:96px;line-height:1.5"></textarea></div>`+
          `</div>`;
      }
      const getF=(n)=>sheet.querySelector('[data-f="'+n+'"]');
      let keep={text:"",date:"",memo:""};
      const snapshot=()=>{ keep={text:getF("text").value,date:getF("date").value,memo:getF("memo").value}; };
      const restore=()=>{ getF("text").value=keep.text; getF("date").value=keep.date; getF("memo").value=keep.memo; };
      function bindFields(){ getF("text").addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); getF("date").focus(); } }); }

      function chooseDest(){
        snapshot();
        const ov2=document.createElement("div");
        ov2.style.cssText="position:fixed;inset:0;z-index:100002;background:rgba(0,0,0,.35);display:flex;flex-direction:column;justify-content:flex-end;font:15px/1.5 -apple-system,system-ui,sans-serif;";
        const sh=document.createElement("div");
        sh.style.cssText="background:#f2f2f7;color:#111;border-radius:16px 16px 0 0;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom,0px);";
        const rowCss="display:flex;align-items:center;gap:12px;padding:13px 16px;background:#fff;border-bottom:1px solid #e5e5ea;cursor:pointer;font-size:16px";
        let rows=`<div data-pick="inbox" style="${rowCss}"><span style="font-size:22px">📥</span><span>インボックス（あとで分類）</span></div>`;
        projects.forEach(p=>{ rows+=`<div data-pick="${p.id}" style="${rowCss}"><span style="font-size:22px">${escH(p.emoji||"📁")}</span><span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(p.name||"(無題)")}</span></div>`; });
        sh.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px"><b style="font-size:16px">追加先を選択</b><button data-act="x" style="background:none;border:0;color:#007aff;font-size:16px">閉じる</button></div><div style="overflow:auto;-webkit-overflow-scrolling:touch;border-top:1px solid #e5e5ea">${rows}</div>`;
        ov2.appendChild(sh);
        sh.addEventListener("click",(ev)=>{
          const r=ev.target.closest("[data-pick]");
          if(r){ const v=r.getAttribute("data-pick");
            if(v==="inbox") dest={type:"inbox"}; else { const p=projects.find(q=>q.id===v); if(p) dest={type:"project",id:p.id,emoji:p.emoji,name:p.name}; }
            ov2.remove(); paint(); restore(); bindFields(); return;
          }
          if(ev.target.closest('[data-act="x"]')) ov2.remove();
        });
        ov2.addEventListener("click",(ev)=>{ if(ev.target===ov2) ov2.remove(); });
        (document.body||document.documentElement).appendChild(ov2);
      }

      function submit(){
        const text=(getF("text").value||"").trim();
        if(!text){ getF("text").focus(); return; }
        const date=(getF("date").value||"").trim();
        const memo=textToMemoHTML(getF("memo").value);
        if(dest.type==="project"){
          const fresh=readState();
          if(!fresh||!Array.isArray(fresh.projects)){ alert("追加に失敗しました(データ未取得)。"); return; }
          const target=fresh.projects.find(p=>p&&p.id===dest.id);
          if(!target){ alert("追加先のプロジェクトが見つかりませんでした。"); return; }
          target.tasks=Array.isArray(target.tasks)?target.tasks:[];
          target.tasks.push({id:newId(),text,done:false,deadline:date||null,memo,subtasks:[]});
          try{ backup("before-add-task",localStorage.getItem(STORAGE_KEY)); }catch{}
          try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(fresh)); }catch(e){ alert("保存に失敗しました: "+(e&&e.message||e)); return; }
          try{ sessionStorage.setItem("taskapp-reopen", dest.id); }catch{}   // ④ 追加後にそのプロジェクトを開く
          close();
          location.reload();
        } else {
          close();
          addToInbox(text, date||null, memo);   // インボックス: アプリのクイック追加を駆動
        }
      }

      paint();
      sheet.addEventListener("click",(ev)=>{
        const act=ev.target.closest("[data-act]"); if(!act) return;
        const a=act.getAttribute("data-act");
        if(a==="cancel") close();
        else if(a==="dest") chooseDest();
        else if(a==="add") submit();
      });
      ov.addEventListener("click",(ev)=>{ if(ev.target===ov) close(); });
      (document.body||document.documentElement).appendChild(ov);
      (document.body||document.documentElement).appendChild(sheet);
      if(vv){ vv.addEventListener("resize",place); vv.addEventListener("scroll",place); }
      place();
      bindFields();
      try{ getF("text").focus(); }catch{}
      setTimeout(place,60); setTimeout(place,300);   // フォーカス→キーボード展開後にも再配置
    }
  }

  // 6) 自動反映で再読込した際、スクロール位置を元に戻す(シームレスに見せる)
  window.addEventListener("load",()=>{
    try{ const y=sessionStorage.getItem("taskapp-scroll"); if(y!=null){ window.scrollTo(0,Number(y)); sessionStorage.removeItem("taskapp-scroll"); } }catch{}
    // ④ タスク追加でリロードした後、開いていたプロジェクト詳細へ自動で戻す(最初の画面に戻らない)
    try{
      const id=sessionStorage.getItem("taskapp-reopen");
      if(id){
        sessionStorage.removeItem("taskapp-reopen");
        let st=null; try{ st=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null"); }catch{}
        const list=(st&&Array.isArray(st.projects))?st.projects.filter(p=>p&&!p.deleted&&!p.completed):[];
        const idx=list.findIndex(p=>p&&p.id===id);
        const name=idx>=0?list[idx].name:null;
        if(idx>=0){
          let tries=0;
          (function loop(){
            if(detailViewVisible()) return;   // ④ 詳細が開けたら終了(クリックが効いた)
            const cards=[...document.querySelectorAll(".ta-rail-card")];
            if(cards.length){
              let card = name ? cards.find(c=>c.getAttribute("title")===name) : null;
              if(!card && idx<cards.length) card = cards[idx];
              if(card) card.click();   // 開くまで再試行(初期描画でクリックが失われても拾い直す)
            }
            if(tries++<60) setTimeout(loop,150);   // 最大~9秒
          })();
        }
      }
    }catch(e){}
  });
</script>
</body>
</html>
