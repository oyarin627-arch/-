<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f9f9f9">
  <title>タスク管理</title>
  <link rel="manifest" href='data:application/manifest+json,{"name":"タスク管理","short_name":"タスク","start_url":".","scope":".","display":"standalone","background_color":"%23f2f2f7","theme_color":"%23f9f9f9"}'>
  <link rel="stylesheet" href="./app.css">
  <link rel="stylesheet" href="./board.css">
</head>
<body>
  <!-- アプリ本体。タブで 掲示板/タスク/勉強/マイページ を切替。
       「タスク」「勉強」タブは従来アプリ(app.html)を iframe 埋め込みして見た目・同期を完全同一に保つ。 -->
  <div id="app">
    <header id="page-header"><h1 id="page-title"></h1></header>
    <main id="content"></main>
    <nav id="tabbar" aria-label="ページ切替"></nav>
  </div>
  <script type="module" src="./app.js"></script>
  <!-- サービスワーカー(network-first)。オンライン時は常に最新を取得、オフラインでも起動可能 -->
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch((e)=>console.warn("[sw] 登録失敗",e)); });
    }
  </script>
</body>
</html>
